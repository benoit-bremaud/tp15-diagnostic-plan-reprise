# SonarQube project configuration — WallRide CMS audit
# Target: Java 1.8 Maven multi-module project
# SonarQube server: http://localhost:9000 (Community Edition, local Docker)
# Authentication: SONAR_TOKEN env var — never hardcode tokens here
#
# Usage (standalone scanner):
#   cd wallride-fork && sonar-scanner
#
# Usage (Maven — recommended for Java projects):
#   cd wallride-fork && mvn sonar:sonar -Dsonar.token=$SONAR_TOKEN
#
# Note: For Maven multi-module projects, the Maven plugin automatically
# discovers modules and sources. This file serves as fallback / reference.

sonar.projectKey=tp15-wallride-audit
sonar.projectName=WallRide CMS — Technical Audit
sonar.projectVersion=1.0.0-SNAPSHOT

sonar.sourceEncoding=UTF-8

# — Language & Java version ————————————————————————————————————————————————
sonar.language=java
sonar.java.source=1.8

# — Sources ————————————————————————————————————————————————————————————————
# Java source directories across Maven modules
sonar.sources=\
  wallride-core/src/main/java,\
  wallride-bootstrap/src/main/java,\
  wallride-tools/src/main/java

# — Tests —————————————————————————————————————————————————————————————————
sonar.tests=\
  wallride-core/src/test/java,\
  wallride-bootstrap/src/test/java

# — Binaries (compiled classes for deeper analysis) ————————————————————————
# If the project has been compiled with `mvn compile`, point to class files
sonar.java.binaries=\
  wallride-core/target/classes,\
  wallride-bootstrap/target/classes,\
  wallride-tools/target/classes

# — Libraries (resolved dependencies for type resolution) ——————————————————
# Maven plugin resolves these automatically; standalone scanner needs them
sonar.java.libraries=\
  wallride-core/target/dependency/*.jar,\
  wallride-bootstrap/target/dependency/*.jar

# — Exclusions ————————————————————————————————————————————————————————————
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  wallride-ui-admin/**,\
  wallride-ui-guest/**,\
  wallride-dependencies/**,\
  wallride-parent/**,\
  **/*.min.js,\
  **/*.min.css

# — Test exclusions ———————————————————————————————————————————————————————
sonar.test.exclusions=\
  **/target/**

# — Coverage (JaCoCo) —————————————————————————————————————————————————————
# No coverage reports exist (near-zero tests), but configure path for future use
sonar.coverage.jacoco.xmlReportPaths=\
  wallride-core/target/site/jacoco/jacoco.xml,\
  wallride-bootstrap/target/site/jacoco/jacoco.xml

# — SonarQube server ——————————————————————————————————————————————————————
# Override with SONAR_HOST_URL env var for non-local deployments.
sonar.host.url=http://localhost:9000
